<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Our Web Site</title>
    <style>
        form { 
            text-align: left;
        }
    </style>
</head>
<body>
    <center>
    <div style="border: 1px solid black; width: 400px; padding: 20px; font-family: serif;">
        <h2 style="margin-top: 0;">Search our web site!</h2>
        <hr>
        <form action="w7ex1.js" method="get">
            <p>Where do you want to search?</p>
            <input type="radio" name="section" value="whole" checked> Whole site<br><br>
            <input type="radio" name="section" value="partners"> Business Partners Section<br><br>
            <input type="radio" name="section" value="corporate"> Corporate Communications Section<br><br>
            <input type="radio" name="section" value="lotus"> Lotus Education Section<br><br>
            <p>Enter a word or two that we can search on:</p>
            <input type="text" name="query" style="width: 360px;"><br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Clear">
        </form> 
    </div>
    </center>
</body>   
</html>
