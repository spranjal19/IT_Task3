<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f8f7f4;
      color: #1c1c1e;
      font-family: system-ui, sans-serif;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 14px;
      color: #6b6b6b;
      margin-bottom: 40px;
    }

    h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e4e2dd;
      margin: 32px 0;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #f1f5ff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      text-decoration: none;
      color: #2563eb;
      font-size: 13px;
      font-weight: 500;
    }

    .nav-link:hover {
      background: #e0f3dbcf;
    }

    .google-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .google-link {
      display: inline-block;
    }

    .google-link img {
      display: block;
      width: 400px;
      height:100px;
      object-fit: contain;
    }

    .goto {
      font-size: 12px;
      color: #6b6b6b;
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: #6b6b6b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Home Page</h1>
    <h2>Links</h2>
    <div class="nav-links">
      <a href="about.html" class="nav-link">About Page</a>
      <a href="about.html#contact" class="nav-link"> Contact Information</a>
    </div>

    <hr class="divider">

    <h2>Visit Google</h2>
    <div class="google-section">
      <a href="https://www.google.com" target="_blank" class="google-link">
        <img
          src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
          alt="Google"
        />
      </a>
      <p class="goto">Click the logo to open www.google.com</p>
    </div>

    <footer>Home Page</footer>
  </div>
</body>
</html>
