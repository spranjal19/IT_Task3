<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Ex-8</title>
</head>
<body>
    <script>
        const myColor = ["Red", "Green", "White", "Black"];

        document.write("<h4>Sample Array:</h4><p>" + myColor + "</p>");
        document.write (`<h4>myColor.toString():</h4><p>${myColor.toString()}</p>`);
        document.write (`<h4>myColor.join():</h4><p>${myColor.join()}</p>`);
        document.write (`<h4>myColor.join('+'):</h4><p>${myColor.join('+')}</p>`);
    </script> 
</body>
</html>
