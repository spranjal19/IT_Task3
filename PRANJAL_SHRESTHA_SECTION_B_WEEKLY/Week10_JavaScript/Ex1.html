<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Ex-1</title>
</head>
<body>
    <div style="margin-top:20px;"> 
<script>
    var num1 = 19;              
    var num2 = 19.99;      
    var text = "Hello"; 
    var bool = false;      
      
    document.write("<h2>JavaScript Data Types</h2>");
    document.write("Integer Value: " + num1 + "<br>");
    document.write("Float Value: " + num2 + "<br>");
    document.write("String Value: " + text + "<br>");
    document.write("Boolean Value: " + bool + "<br>");
</script>
</div>
</body>
</html>
