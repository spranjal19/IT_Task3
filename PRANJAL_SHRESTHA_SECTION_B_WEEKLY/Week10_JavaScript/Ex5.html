<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Ex-5</title>
    <style>
        .container {
            text-align: center;
            margin: 20px;
        }
        .container img {
            width: 200px;
            height: 150px;
            margin: 10px;
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <div id="gallery" class="container"></div>
    <script>
        for (let i = 1; i <= 4; i++) {
            let img = document.createElement('img');
            img.src = i + '.png';
            img.alt = i + '.png';
            img.onclick = function() {
                alert('Image name: ' + this.alt);
            };
            document.getElementById('gallery').appendChild(img);
        }
    </script>
</body>
</html>
