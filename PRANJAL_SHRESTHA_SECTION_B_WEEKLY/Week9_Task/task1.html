<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="main" id="main">
        <div class="c1">Column 1</div>
        <div class="c2">Column 2</div>
        <div class="c3">Column 3</div>

        <div class ="blue">
            A numbered list:
            <ol> 
                <li>Able</li>
                <li>Baker</li>
                <li>Charlie</li>
                <li>Delta</li>
                <li>Echo</li>
            </ol>
        </div>

        <div class ="yellow"> B </div>

        <div class ="red"> C </div>

        <div class ="green">
            An unnumbered list:
            <ul>
                <li>Pounds</li>
                <li>Dollars</li>
                <li>Euro</li>
                <li>Yen</li>
                <li>Roubles</li>
            </ul>
        </div>
    </div>
</body>
</html>
